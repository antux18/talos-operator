---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: taloscontrolplanes.talos.alperen.cloud
spec:
  group: talos.alperen.cloud
  names:
    kind: TalosControlPlane
    listKind: TalosControlPlaneList
    plural: taloscontrolplanes
    singular: taloscontrolplane
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TalosControlPlane is the Schema for the taloscontrolplanes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TalosControlPlaneSpec defines the desired state of TalosControlPlane.
            properties:
              clusterDomain:
                default: cluster.local
                description: ClusterDomain is the domain for the Kubernetes cluster
                pattern: ^([a-zA-Z0-9]([-a-zA-Z0-9]*[a-zA-Z0-9])?\.)+[a-z]{2,}$
                type: string
              cni:
                description: CNI configuration for the cluster
                properties:
                  flannel:
                    description: Flannel configuration options
                    properties:
                      extraArgs:
                        description: Extra arguments for 'flanneld'
                        items:
                          type: string
                        type: array
                    type: object
                  name:
                    description: Name of CNI to use (flannel, custom, none)
                    enum:
                    - flannel
                    - custom
                    - none
                    type: string
                  urls:
                    description: |-
                      URLs containing manifests to apply for the CNI.
                      Should be present for "custom", must be empty for "flannel" and "none".
                    items:
                      type: string
                    type: array
                type: object
              configRef:
                description: Reference to a ConfigMap containing the Talos controlplane
                  configuration
                properties:
                  key:
                    description: The key to select.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the ConfigMap or its key must be
                      defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              endpoint:
                description: Endpoint for the Kubernetes API Server
                pattern: ^https?://[a-zA-Z0-9.-]+(:\d+)?$
                type: string
              kubeVersion:
                default: v1.35.0
                description: KubeVersion is the version of Kubernetes to use for the
                  control plane
                pattern: ^v\d+\.\d+\.\d+(-\w+)?$
                type: string
              metalSpec:
                description: Metal Spec is required when mode is 'metal'
                properties:
                  machineSpec:
                    description: MachineSpec defines the specifications for each Talos
                      control plane machine.
                    properties:
                      additionalConfig:
                        description: AdditionalConfig is additional Talos configuration
                          to append to the generated config.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      airGap:
                        default: false
                        description: AirGap indicates whether the machine is in an
                          air-gapped environment.
                        type: boolean
                      allowSchedulingOnControlPlanes:
                        default: false
                        description: AllowSchedulingOnControlPlanes indicates whether
                          to allow scheduling workloads on control plane nodes.
                        type: boolean
                      configPatches:
                        description: |-
                          ConfigPatches is a list of strategic merge patches applied to the generated Talos machine config.
                          Unlike additionalConfig (which appends a separate YAML document), each patch is merged into
                          the main machine config, allowing you to override or extend any field (e.g. machine.network).
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        type: array
                      image:
                        description: Image is the Talos image to use for this machine.
                        type: string
                      imageCache:
                        default: false
                        description: ImageCache indicates whether to enable local
                          image caching on the machine.
                        type: boolean
                      installDisk:
                        description: InstallDisk is the disk to use for installing
                          Talos on the control plane machines.
                        pattern: ^/dev/(sd[a-z][0-9]*|vd[a-z][0-9]*|nvme[0-9]+n[0-9]+(p[0-9]+)?)$
                        type: string
                      meta:
                        description: Meta is the meta partition that used by Talos.
                        properties:
                          dnsServers:
                            description: DNS Servers is a list of DNS servers for
                              the Talos machines.
                            items:
                              type: string
                            type: array
                          gateway:
                            description: Gateway is the gateway for the Talos machines.
                            type: string
                          hostname:
                            description: Hostname is the hostname for the Talos machines.
                            type: string
                          interface:
                            description: Interface is the network interface name for
                              Talos machines.
                            type: string
                          subnet:
                            description: Subnet is the subnet for the Talos machines.
                            type: integer
                        type: object
                      registries:
                        description: Registries is the path to a custom registries
                          configuration file.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      wipe:
                        default: false
                        description: Wipe indicates whether to wipe the disk before
                          installation.
                        type: boolean
                    type: object
                  machines:
                    description: Machines is a list of machine specifications for
                      the Talos control plane.
                    items:
                      properties:
                        address:
                          description: Address is the IP address of the Talos machine.
                          pattern: ^(\d{1,3}\.){3}\d{1,3}$
                          type: string
                        configPatches:
                          description: |-
                            configPatches is a list of strategic merge patches applied to the generated Talos machine config.
                            Unlike additionalConfig (which appends a separate YAML document), each patch is merged into
                            the main machine config, allowing you to override or extend any field (e.g. machine.network).
                            Unlike the control plane level property of the same name, this one is individual to each machine.
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          type: array
                        machineRef:
                          description: MachineRef is a reference to a Kubernetes object
                            from which the machine IP address can be extracted.
                          properties:
                            apiVersion:
                              description: API version of the referent.
                              type: string
                            fieldPath:
                              description: |-
                                If referring to a piece of an object instead of an entire object, this string
                                should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                                For example, if the object reference is to a container within a pod, this would take on a value like:
                                "spec.containers{name}" (where "name" refers to the name of the container that triggered
                                the event) or if no container name is specified "spec.containers[2]" (container with
                                index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                referencing a part of an object.
                              type: string
                            kind:
                              description: |-
                                Kind of the referent.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                              type: string
                            name:
                              description: |-
                                Name of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            namespace:
                              description: |-
                                Namespace of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                              type: string
                            resourceVersion:
                              description: |-
                                Specific resourceVersion to which this reference is made, if any.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                              type: string
                            uid:
                              description: |-
                                UID of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                              type: string
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                      x-kubernetes-validations:
                      - message: address and machineRef are mutually exclusive
                        rule: has(self.address) != has(self.machineRef)
                    type: array
                type: object
              mode:
                enum:
                - container
                - metal
                - cloud
                type: string
              podCIDR:
                description: PodCIDRs is the list of CIDR ranges for pod IPs in the
                  cluster.
                items:
                  type: string
                type: array
              replicas:
                description: Number of control-plane machines to maintain
                format: int32
                minimum: 1
                type: integer
              serviceCIDR:
                description: ServiceCIDRs is the list of CIDR ranges for service IPs
                  in the cluster.
                items:
                  type: string
                type: array
              storageClassName:
                description: StorageClassName is the name of the storage class to
                  use for persistent volumes
                pattern: ^[a-zA-Z0-9][-a-zA-Z0-9_.]*[a-zA-Z0-9]$
                type: string
              version:
                default: v1.12.1
                description: Version of Talos to use for the control plane(controller-manager,
                  scheduler, kube-apiserver, etcd) -- e.g "v1.12.1"
                pattern: ^v\d+\.\d+\.\d+(-\w+)?$
                type: string
            required:
            - kubeVersion
            - mode
            - version
            type: object
            x-kubernetes-validations:
            - message: ClusterDomain is immutable
              rule: '!has(oldSelf.clusterDomain) || has(self.clusterDomain)'
            - message: Machines is required when mode is 'metal'
              rule: self.mode != 'metal' || size(self.metalSpec.machines) > 0
          status:
            description: TalosControlPlaneStatus defines the observed state of TalosControlPlane.
            properties:
              bundleConfig:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              config:
                type: string
              imported:
                description: Imported is only valid when ReconcileMode is 'import'
                  and indicates whether the Talos control plane has been imported
                type: boolean
              observedKubeVersion:
                description: ObservedKubeVersion is the observed version of Kubernetes.
                type: string
              secretBundle:
                type: string
              state:
                description: |-
                  INSERT ADDITIONAL STATUS FIELD - define observed state of cluster
                  Important: Run "make" to regenerate code after modifying this file
                  Conditions is a list of conditions for the Talos control plane
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
